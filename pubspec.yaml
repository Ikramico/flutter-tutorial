name: flutteria
description: A beautiful Flutter Quiz App with Google Authentication

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management ───────────────────────────────────────────────────────
  bloc: ^9.0.0              # ✅ ADDED: flutter_bloc depends on this explicitly
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # ── DI ────────────────────────────────────────────────────────────────────
  get_it: ^9.2.1

  # ── Routing ───────────────────────────────────────────────────────────────
  go_router: ^17.3.0

  # ── Auth ──────────────────────────────────────────────────────────────────
  google_sign_in: ^7.2.0

  # ── Network ───────────────────────────────────────────────────────────────
  http: ^1.2.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpeg

